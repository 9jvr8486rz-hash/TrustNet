<script type="module">
import { supabase } from '/src/lib/supabase.js';

window.doLogout = async () => { await supabase.auth.signOut(); window.location.replace('/login.html'); };

async function renderDashboard(session) {
  if (!session) { window.location.replace('/login.html'); return; }
  const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
  if (!profile) { window.location.replace('/login.html'); return; }
  if (profile.role === 'admin') { window.location.replace('/admin.html'); return; }
  const h = new Date().getHours();
  document.getElementById('timeTag').textContent = h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  document.getElementById('greetName').textContent = profile.name?.split(' ')[0] || 'there';
  document.getElementById('navName').textContent = profile.name || session.user.email;
  const now = new Date();
  const expiry = profile.expiry_date ? new Date(profile.expiry_date) : null;
  const status = (!profile.verification_status||profile.verification_status==='pending') ? 'pending'
    : profile.verification_status==='rejected' ? 'rejected'
    : (expiry&&now>expiry) ? 'expired'
    : profile.verification_status;
  const badgeMap = {verified:'dcb-green',pending:'dcb-amber',expired:'dcb-red',rejected:'dcb-red'};
  const badgeLabel = {verified:'&#9679; Verified',pending:'&#9679; Pending review',expired:'&#9679; Expired',rejected:'&#9679; Rejected'};
  const badge = document.getElementById('myStatusBadge');
  badge.className = 'dc-badge '+(badgeMap[status]||'dcb-amber');
  badge.innerHTML = badgeLabel[status]||'Pending';
  const fmt = d => d ? new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const start = profile.verification_date ? new Date(profile.verification_date) : null;
  const pct = (expiry&&start) ? Math.max(0,Math.min(100,100-((now-start)/(expiry-start)*100))) : 0;
  const days = expiry ? Math.max(0,Math.round((expiry-now)/86400000)) : 0;
  const barClass = days>10?'ef-good':days>3?'ef-warn':'ef-bad';
  document.getElementById('myVerificationBody').innerHTML = `
    <div class="my-profile-row">
      ${profile.selfie_url?`<img src="${profile.selfie_url}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 0 0 2px var(--blue-light);flex-shrink:0">`:'<div class="my-avatar">&#128100;</div>'}
      <div><div class="my-name">${profile.name||session.user.email}</div><div class="my-cat">${profile.service_category||'Service provider'}</div></div>
      <div class="my-status"><span class="status-pill ${status==='verified'?'sp-verified':status==='expired'?'sp-expired':'sp-pending'}">${status==='verified'?'&#10003; Verified':status==='expired'?'&#9888; Expired':status==='rejected'?'&#10007; Rejected':'&#8987; '+status.charAt(0).toUpperCase()+status.slice(1)}</span></div>
    </div>
    <div class="two-col">
      <div class="info-box"><div class="ib-label">Verified on</div><div class="ib-val">${fmt(profile.verification_date)}</div></div>
      <div class="info-box"><div class="ib-label">Expires on</div><div class="ib-val">${fmt(profile.expiry_date)}</div></div>
    </div>
    ${profile.public_id?`
      <div style="font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:0.5rem">Your verification ID</div>
      <div class="id-row"><span>${profile.public_id}</span><button class="copy-btn" onclick="copyText('${profile.public_id}','Code copied!')">Copy</button></div>
      <div class="expiry-wrap">
        <div class="expiry-labels"><span>Validity</span><span>${days>0?days+' days remaining':'Expired'}</span></div>
        <div class="expiry-track"><div class="expiry-fill ${barClass}" style="width:${pct}%"></div></div>
      </div>`
    :`<div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-sm);padding:0.85rem 1rem;font-size:0.875rem;color:var(--amber);margin-top:0.5rem;line-height:1.6">&#9201; Your application is under review. We'll email you within 48 hours when approved.</div>`}
  `;
  if (profile.public_id&&status==='verified') {
    const verifyUrl = `${location.origin}/verify.html?id=${profile.public_id}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(verifyUrl)}`;
    document.getElementById('shareBody').innerHTML = `
      <div class="qr-center">
        <div class="qr-box"><img src="${qrUrl}" width="130" height="130" alt="Your QR Code"></div>
        <div class="qr-link">${verifyUrl}</div>
        <div class="share-grid">
          <button class="share-btn sb-wa" onclick="window.open('https://api.whatsapp.com/send?text=Verify my TrustNet identity: ${encodeURIComponent(verifyUrl)}','_blank')">&#128242; WhatsApp</button>
          <button class="share-btn sb-link" onclick="copyText('${verifyUrl}','Link copied!')">&#128279; Copy link</button>
          <button class="share-btn sb-code" onclick="copyText('${profile.public_id}','Code copied!')">&#128203; Copy code</button>
          <button class="share-btn sb-dl" onclick="window.open('${qrUrl}','_blank')">&#11015;&#65039; Save QR</button>
        </div>
      </div>`;
  }
}

// Load on page open
const { data: { session } } = await supabase.auth.getSession();
await renderDashboard(session);

// Also handle sign in event
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN') await renderDashboard(session);
  if (event === 'SIGNED_OUT') window.location.replace('/login.html');
});

window.doLookup = async () => {
  const code = document.getElementById('lookupInput').value.trim().toUpperCase();
  if (!code) { showToast('Please enter a code'); return; }
  const { data, error } = await supabase.from('profiles').select('name,service_category,selfie_url,verification_status,verification_date,expiry_date,public_id').eq('public_id',code).single();
  const el = document.getElementById('lookupResult');
  if (!data||error) { el.innerHTML=`<div style="padding:0.75rem;color:var(--muted);font-size:0.875rem">&#10060; No provider found with code <strong style="font-family:monospace;color:var(--ink)">${code}</strong>.</div>`; el.classList.add('show'); return; }
  const s = (data.expiry_date&&new Date()>new Date(data.expiry_date))?'expired':data.verification_status;
  const pc = s==='verified'?'sp-verified':s==='expired'?'sp-expired':'sp-pending';
  const pl = s==='verified'?'&#10003; Verified':s==='expired'?'&#9888; Expired':'&#8987; Pending';
  const fmt2 = d => d?new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}):'—';
  el.innerHTML = `<div class="vr-inner"><div class="vr-row">${data.selfie_url?`<img src="${data.selfie_url}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0">`:'<div class="vr-avatar">&#128100;</div>'}<div class="vr-info"><div class="vr-name">${data.name}</div><div class="vr-cat">${data.service_category||''}</div></div><span class="status-pill ${pc}">${pl}</span></div><div class="vr-dates-row"><div class="vr-date-chip"><div class="vdl">Verified</div><div class="vdv">${fmt2(data.verification_date)}</div></div><div class="vr-date-chip"><div class="vdl">Expires</div><div class="vdv">${fmt2(data.expiry_date)}</div></div>${s==='verified'?'<div class="vr-date-chip" style="color:var(--green)">&#10003; ID checked</div><div class="vr-date-chip" style="color:var(--green)">&#10003; Selfie checked</div>':''}</div></div>`;
  el.classList.add('show');
};

window.copyText = (text,msg) => { navigator.clipboard.writeText(text).catch(()=>{}); showToast('&#128203; '+msg); };
window.showToast = msg => { const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); };
</script>
