<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — TrustNet</title>
<link rel="stylesheet" href="/styles/main.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav><div class="nav-inner"><a class="logo" href="/"><div class="logo-mark">T</div>TrustNet</a></div></nav>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">👋</div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your TrustNet account</p>
    <div id="authError" class="error-box" style="display:none"></div>
    <div class="form-field"><label>Email address</label><input class="form-input" type="email" id="email" placeholder="you@example.com"></div>
    <div class="form-field"><label>Password</label><input class="form-input" type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-full" onclick="doLogin()" id="loginBtn">Sign in</button>
    <p class="auth-footer">No account? <a href="/apply.html">Apply for verification &rarr;</a></p>
  </div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://oymmmevtzbzoneujtkhn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95bW1tZXZ0emJ6b25ldWp0a2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTE4MTQsImV4cCI6MjA5MzU4NzgxNH0.sRrw5cthKfF7k0vP0_ONCLiQN6J4CIerzzu5NRUCXlU';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

window.doLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('authError');
  err.style.display = 'none';
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr(error.message); btn.textContent = 'Sign in'; btn.disabled = false; return; }
  const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
  window.location.replace(profile?.role === 'admin' ? '/admin.html' : '/dashboard.html');
};

function showErr(msg) {
  const e = document.getElementById('authError');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
