<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — TrustNet</title>
<link rel="stylesheet" href="/styles/main.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav><div class="nav-inner">
  <a class="logo" href="/"><div class="logo-mark">T</div>TrustNet</a>
  <div class="nav-actions">
    <span style="font-size:0.82rem;font-weight:600;color:var(--blue);background:var(--blue-light);padding:0.3rem 0.75rem;border-radius:6px">Admin</span>
    <button class="btn-nav-ghost" onclick="doLogout()">Sign out</button>
  </div>
</div></nav>
<div class="admin-wrap">
  <div class="admin-header">
    <h2>Admin dashboard</h2>
    <span id="adminBadge" class="status-pill sp-verified">&#9679; Admin access</span>
  </div>
  <div class="admin-stats" id="adminStats">
    <div class="stat-card gold"><div class="num" id="statPending">—</div><div class="lbl">Pending review</div></div>
    <div class="stat-card teal"><div class="num" id="statVerified">—</div><div class="lbl">Verified</div></div>
    <div class="stat-card red"><div class="num" id="statRejected">—</div><div class="lbl">Rejected / Expired</div></div>
  </div>
  <div class="applications-table">
    <div class="table-header">
      <div>Provider</div><div>Category</div><div>Status</div><div>Applied</div><div>Actions</div>
    </div>
    <div id="adminRows"><div style="padding:2rem;text-align:center;color:var(--muted)">Loading applications...</div></div>
  </div>
</div>
<div id="docModal" class="modal-bg">
  <div class="modal">
    <h3>Documents</h3>
    <p id="docModalName" style="font-weight:600;margin-bottom:1rem"></p>
    <div id="docModalContent"></div>
    <button class="btn-full" style="margin-top:1rem" onclick="document.getElementById('docModal').classList.remove('open')">Close</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { supabase } from '/src/lib/supabase.js';
const { data: { session } } = await supabase.auth.getSession();
if (!session) { location.href = '/login.html'; }
const user = session.user;

const { data: me } = await supabase.from('profiles').select('role').eq('id', user.id).single();
if (!me || me.role !== 'admin') { location.href = '/dashboard.html'; }

// Add sign out button to nav
document.querySelector('.nav-actions').innerHTML = `
  <span style="font-size:0.82rem;font-weight:600;color:var(--blue);background:var(--blue-light);padding:0.3rem 0.75rem;border-radius:6px">Admin</span>
  <button class="btn-nav-ghost" onclick="doLogout()">Sign out</button>
`;

window.doLogout = async () => {
  await supabase.auth.signOut();
  window.location.replace('/login.html');
};
const { data: me } = await supabase.from('profiles').select('role').eq('id',user.id).single();
if (!me || me.role !== 'admin') { location.href='/dashboard.html'; }

async function loadProfiles() {
  const { data } = await supabase.from('profiles').select('*').neq('role','admin').order('created_at',{ascending:false});
  if (!data) return;
  document.getElementById('statPending').textContent = data.filter(p=>p.verification_status==='pending'||!p.verification_status).length;
  document.getElementById('statVerified').textContent = data.filter(p=>p.verification_status==='verified').length;
  document.getElementById('statRejected').textContent = data.filter(p=>p.verification_status==='rejected'||(p.expiry_date&&new Date()>new Date(p.expiry_date))).length;
  const rows = document.getElementById('adminRows');
  if (!data.length) { rows.innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted)">No applications yet.</div>'; return; }
  rows.innerHTML = data.map(p => {
    const now = new Date();
    const status = (!p.verification_status||p.verification_status==='pending') ? 'pending' : (p.expiry_date&&now>new Date(p.expiry_date)) ? 'expired' : p.verification_status;
    const pill = status==='verified'?'sp-verified':status==='expired'?'sp-expired':'sp-pending';
    const label = status==='verified'?'&#10003; Verified':status==='expired'?'&#9888; Expired':status==='rejected'?'&#10007; Rejected':'&#8987; Pending';
    const date = new Date(p.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});
    const avatar = p.selfie_url ? `<img src="${p.selfie_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0">` : '<div class="provider-avatar">&#128100;</div>';
    const actions = status==='pending'
      ? `<button class="action-btn approve" onclick="approveProvider('${p.id}')">Approve</button><button class="action-btn reject" onclick="rejectProvider('${p.id}')">Reject</button>`
      : `<button class="action-btn view" onclick="viewDocs('${p.id}','${p.name||'Provider'}','${p.id_document_url||''}')">View docs</button>`;
    return `<div class="table-row">
      <div class="provider-info">${avatar}<div><div class="provider-name">${p.name||'—'}</div><div class="provider-email">${p.phone||''}</div></div></div>
      <div style="font-size:0.875rem">${p.service_category||'—'}</div>
      <div><span class="status-pill ${pill}">${label}</span></div>
      <div style="font-size:0.82rem;color:var(--muted)">${date}</div>
      <div class="action-btns">${actions}</div>
    </div>`;
  }).join('');
}

window.approveProvider = async (id) => {
  const now = new Date();
  const expiry = new Date(now); expiry.setDate(expiry.getDate()+30);
  let publicId;
  do {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    publicId = 'TN-' + Array.from({length:8},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
    const { data } = await supabase.from('profiles').select('id').eq('public_id',publicId);
    if (!data?.length) break;
  } while (true);
  const { error } = await supabase.from('profiles').update({
    verification_status: 'verified',
    verification_date: now.toISOString(),
    expiry_date: expiry.toISOString(),
    public_id: publicId
  }).eq('id', id);
  if (error) { showToast('Error: '+error.message); return; }
  showToast('&#10003; Provider approved and verification ID generated.');
  loadProfiles();
};

window.rejectProvider = async (id) => {
  if (!confirm('Reject this application?')) return;
  await supabase.from('profiles').update({ verification_status:'rejected' }).eq('id',id);
  showToast('Application rejected.');
  loadProfiles();
};

window.viewDocs = (id, name, idDocPath) => {
  document.getElementById('docModalName').textContent = name;
  const content = document.getElementById('docModalContent');
  if (idDocPath) {
    const { data } = supabase.storage.from('id-documents').getPublicUrl(idDocPath);
    content.innerHTML = `<p style="font-size:0.875rem;color:var(--muted);margin-bottom:0.75rem">ID document uploaded. Admin-only access required to view.</p><a href="${data.publicUrl}" target="_blank" class="btn-full" style="text-decoration:none;text-align:center;display:block">View ID document &rarr;</a>`;
  } else {
    content.innerHTML = '<p style="color:var(--muted);font-size:0.875rem">No documents uploaded.</p>';
  }
  document.getElementById('docModal').classList.add('open');
};

window.doLogout = async () => { await supabase.auth.signOut(); location.href='/'; };
window.showToast = msg => { const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); };
document.getElementById('docModal').addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
loadProfiles();
</script>
</body>
</html>
